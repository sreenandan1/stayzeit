<div class="landing-page">

  <!-- HEADER -->
  <header class="navbar navbar-expand-lg navbar-light custom-navbar py-4">
    <div class="container">
      
      <!-- Logo -->
      <a class="navbar-brand d-flex align-items-center fw-bold" href="#">
        <div class="logo-circle me-2">
          <span>G</span>
        </div>
        <span class="logo-text">gohub</span>
      </a>

      <!-- Mobile Toggle -->
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarContent"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Nav Links -->
      <div class="collapse navbar-collapse justify-content-end" id="navbarContent">
        <ul class="navbar-nav align-items-lg-center">
          <li class="nav-item mx-3">
            <a class="nav-link fw-semibold" href="#">Product</a>
          </li>
          <li class="nav-item mx-3">
            <a class="nav-link fw-semibold" href="#">Customers</a>
          </li>
          <li class="nav-item mx-3">
            <a class="nav-link fw-semibold" href="#">Pricing</a>
          </li>
          <li class="nav-item mx-3">
            <a class="nav-link fw-semibold" href="#">Docs</a>
          </li>
          <li class="nav-item ms-lg-4 mt-3 mt-lg-0">
            <a href="#" class="btn btn-premium px-5 py-3">Sign Up</a>
          </li>
        </ul>
      </div>
    </div>
  </header>

  <!-- HERO SECTION -->
  <section class="hero-section position-relative overflow-hidden">
    <div class="container">
      <div class="row align-items-center min-vh-100">

        <!-- LEFT CONTENT -->
        <div class="col-lg-5 hero-content">
          <h1 class="hero-title">
            Balance agility with stability
          </h1>

          <p class="hero-description mt-4">
            Gohub monitors application stability, so you can make data-driven
            decision on whether you should be building new features, or fixing bugs.
          </p>

          <div class="d-flex flex-wrap align-items-center mt-5">
            <a href="#" class="btn btn-premium me-4 px-5 py-3">
              Get started
            </a>

            <a href="#" class="text-dark fw-semibold text-decoration-none team-link">
              Questions? Talk to our team
              <span class="ms-2">&#8594;</span>
            </a>
          </div>
        </div>

        <!-- RIGHT ILLUSTRATION -->
        <div class="col-lg-7 position-relative hero-illustration">
          <div class="illustration-bg"></div>

          <!-- Decorative World Landmark Shapes -->
          <div class="landmark london"></div>
          <div class="landmark statue"></div>
          <div class="landmark wheel"></div>
          <div class="landmark tower"></div>
          <div class="landmark dome"></div>

          <!-- Floating Balloons -->
          <div class="balloon balloon-1"></div>
          <div class="balloon balloon-2"></div>

          <!-- Bottom Card -->
          <div class="mini-card shadow-lg">
            <div class="mini-top"></div>
            <div class="mini-bottom"></div>
          </div>
        </div>

      </div>
    </div>

    <!-- Background Shapes -->
    <div class="bg-shape shape-left"></div>
    <div class="bg-shape shape-right"></div>

  </section>
